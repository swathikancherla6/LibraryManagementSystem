spring:
  application:
    name: library-management-api
  profiles:
    active: dev

server:
  port: 8080
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:4f8c2e9a7b1d6f3c8e5a0b9d2f7c4e1a6b3d8f0c5e2a9b6d3f8c1e4a7b0d9f2}
    expiration-ms: 86400000
  borrow:
    default-loan-days: 14
    max-renewals: 2
    renewal-days: 7
  fine:
    daily-rate: 5.00

management:
  endpoints:
    web:
      exposure:
        include: health,info
