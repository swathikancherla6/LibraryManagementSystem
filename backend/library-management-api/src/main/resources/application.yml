spring:
  application:
    name: library-management-api
  profiles:
    active: dev

server:
  port: 8080
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-only-not-for-production-CHANGE-ME-32chars-min}
    expiration-ms: 86400000
  borrow:
    default-loan-days: 14
    max-renewals: 2
    renewal-days: 7
  fine:
    daily-rate: 5.00

management:
  endpoints:
    web:
      exposure:
        include: health,info
