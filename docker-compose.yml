version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: library-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: library_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend/library-management-api
      dockerfile: Dockerfile
    container_name: library-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/library_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: 4f8c2e9a7b1d6f3c8e5a0b9d2f7c4e1a6b3d8f0c5e2a9b6d3f8c1e4a7b0d9f2
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/library-management-ui
      dockerfile: Dockerfile
    container_name: library-ui
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
